<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mama Riot - Final Edition</title>
    <style>
        body { 
            background-color: #0b0118; 
            color: #39ff14; 
            font-family: 'Courier New', Courier, monospace; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }
        
        h1 { color: #ff00ff; text-shadow: 2px 2px #00ffff; }

        #gameContainer { 
            position: relative; 
            width: 800px; 
            height: 600px; 
            margin: 0 auto; 
            border: 4px solid #39ff14; 
            border-radius: 10px; 
            overflow: hidden; 
        }

        #splashScreen, #gameOverScreen { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            z-index: 10; 
        }

        #splashScreen { background: url('poster.jpg') center/cover; cursor: pointer; justify-content: flex-end; padding-bottom: 50px; }
        #gameOverScreen { background: rgba(0,0,0,0.85); display: none; }

        .menuBtn { 
            color: #39ff14; 
            font-size: 30px; 
            font-weight: bold; 
            padding: 20px 40px; 
            border: 3px solid #ff00ff; 
            background: rgba(0,0,0,0.5);
            cursor: pointer; 
        }
    </style>
</head>
<body>

    <h1>MAMA RIOT</h1>
    <div id="gameContainer">
        <div id="splashScreen"><div class="menuBtn">START GAME</div></div>
        <div id="gameOverScreen"><div class="menuBtn" onclick="location.reload()">PLAY AGAIN</div></div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const splash = document.getElementById("splashScreen");
        const over = document.getElementById("gameOverScreen");
        
        const music = new Audio('music.mp3');
        music.loop = true;

        let gameActive = false, score = 0;
        let player = { x: 370, y: 520, w: 60, h: 60, dx: 0 };
        let bullets = [], enemies = [];

        // Indítás
        splash.onclick = () => {
            splash.style.display = "none";
            gameActive = true;
            music.play();
            loop();
        };

        // Irányítás
        window.onkeydown = (e) => {
            if(e.code === 'ArrowLeft') player.dx = -8;
            if(e.code === 'ArrowRight') player.dx = 8;
            if(e.code === 'Space' && gameActive) bullets.push({x: player.x+20, y: player.y});
        };
        window.onkeyup = () => player.dx = 0;

        function loop() {
            if(!gameActive) return;

            // Frissítés
            player.x += player.dx;
            bullets.forEach((b, i) => { b.y -= 10; if(b.y < 0) bullets.splice(i, 1); });
            
            if(Math.random() < 0.02) enemies.push({x: Math.random()*740, y: 0});
            
            enemies.forEach((e, i) => {
                e.y += 2;
                if(e.y > 600) { gameActive = false; over.style.display = "flex"; }
                
                bullets.forEach((b, j) => {
                    if(b.x > e.x && b.x < e.x+60 && b.y > e.y && b.y < e.y+60) {
                        enemies.splice(i, 1); bullets.splice(j, 1); score += 10;
                    }
                });
            });

            // Rajzolás
            ctx.clearRect(0,0,800,600);
            ctx.fillStyle = "#39ff14";
            ctx.fillRect(player.x, player.y, 60, 60);
            bullets.forEach(b => ctx.fillRect(b.x, b.y, 10, 20));
            enemies.forEach(e => ctx.fillRect(e.x, e.y, 60, 60));
            ctx.fillText("Score: " + score, 20, 30);

            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
