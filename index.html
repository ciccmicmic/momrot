<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mama Riot - Arcade Edition</title>
    <style>
        body { background-color: #0b0118; color: #39ff14; font-family: 'Courier New', Courier, monospace; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #ff00ff; text-shadow: 2px 2px #00ffff; margin-bottom: 5px; }
        #gameContainer { position: relative; width: 800px; height: 600px; margin: 0 auto; border: 4px solid #39ff14; border-radius: 10px; overflow: hidden; }
        #splashScreen, #gameOverScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        #splashScreen { background: url('poster.jpg') center/cover; cursor: pointer; justify-content: flex-end; padding-bottom: 50px; }
        #gameOverScreen { background: rgba(0,0,0,0.85); display: none; }
        .menuBtn { color: #39ff14; font-size: 30px; font-weight: bold; padding: 20px 40px; border: 3px solid #ff00ff; background: rgba(0,0,0,0.5); cursor: pointer; margin-top: 20px; }
        #highScoreBoard { color: #00ffff; font-size: 24px; margin-top: 10px; background: rgba(0,0,0,0.6); padding: 10px; display: inline-block; }
        input { background: #0b0118; color: #39ff14; border: 2px solid #39ff14; padding: 10px; font-size: 20px; font-family: 'Courier New'; text-align: center; width: 250px; }
    </style>
</head>
<body>
    <h1>MAMA RIOT</h1>
    <div id="highScoreBoard">HIGH SCORE: ---</div>
    <div id="gameContainer">
        <div id="splashScreen"><div class="menuBtn">START GAME</div></div>
        
        <div id="gameOverScreen">
            <div style="color: #ff00ff; font-size: 40px; margin-bottom: 20px;">GAME OVER!</div>
            <input type="text" id="playerName" placeholder="ENTER NAME" maxlength="10">
            <div class="menuBtn" onclick="saveScore()">SAVE SCORE</div>
        </div>
        
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const splash = document.getElementById("splashScreen");
        const over = document.getElementById("gameOverScreen");
        const board = document.getElementById("highScoreBoard");
        
        let topScore = localStorage.getItem('mamaRiotTop') || 0;
        let topName = localStorage.getItem('mamaRiotName') || "---";
        board.innerText = `HIGH SCORE: ${topName} - ${topScore}`;

        const playerImg = new Image(); playerImg.src = 'player.png';
        const bulletImg = new Image(); bulletImg.src = 'bullet.png';
        const enemyImg = new Image(); enemyImg.src = 'enemy.png';
        const music = new Audio('music.mp3'); music.loop = true;

        let gameActive = false, score = 0, frameCount = 0;
        let player = { x: 370, y: 520, w: 60, h: 60, dx: 0 };
        let bullets = [], enemies = [];

        splash.onclick = () => { splash.style.display = "none"; gameActive = true; music.play(); loop(); };
        window.onkeydown = (e) => {
            if(e.code === 'ArrowLeft') player.dx = -8;
            if(e.code === 'ArrowRight') player.dx = 8;
            if(e.code === 'Space' && gameActive) bullets.push({x: player.x+20, y: player.y});
        };
        window.onkeyup = () => player.dx = 0;

        function saveScore() {
            let nameInput = document.getElementById('playerName').value || "ANONIM";
            if(score > topScore) {
                localStorage.setItem('mamaRiotTop', score);
                localStorage.setItem('mamaRiotName', nameInput.toUpperCase());
            }
            location.reload();
        }

        function loop() {
            if(!gameActive) return;
            player.x = Math.max(0, Math.min(740, player.x + player.dx));
            bullets.forEach((b, i) => { b.y -= 10; if(b.y < 0) bullets.splice(i, 1); });

            let spawnRate = Math.max(40, 180 - score / 5);
            let enemySpeed = Math.min(5, 1.5 + score / 200);

            frameCount++;
            if(frameCount > spawnRate) {
                enemies.push({x: Math.random() * 740, y: -60});
                frameCount = 0;
            }

            enemies.forEach((e, i) => {
                e.y += enemySpeed;
                if(e.y > 540) { gameActive = false; over.style.display = "flex"; }
                bullets.forEach((b, j) => {
                    if(b.x > e.x && b.x < e.x+60 && b.y > e.y && b.y < e.y+60) {
                        enemies.splice(i, 1); bullets.splice(j, 1); score += 10;
                    }
                });
            });

            ctx.clearRect(0,0,800,600);
            if (playerImg.complete) ctx.drawImage(playerImg, player.x, player.y, 60, 60);
            bullets.forEach(b => { if (bulletImg.complete) ctx.drawImage(bulletImg, b.x, b.y, 20, 40); });
            enemies.forEach(e => { if (enemyImg.complete) ctx.drawImage(enemyImg, e.x, e.y, 60, 60); });
            ctx.fillStyle = "#39ff14"; ctx.font = "24px Courier New"; ctx.fillText("Score: " + score, 40, 40);
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
