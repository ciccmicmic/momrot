<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mama Riot - Baby Shower Mini Game</title>
    <style>
        body {
            background-color: #0b0118;
            color: #39ff14;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #ff00ff;
            text-shadow: 2px 2px #00ffff;
        }
        
        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            margin: 0 auto;
            border: 4px solid #39ff14;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.4);
            border-radius: 10px;
            overflow: hidden;
        }

        #splashScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('poster.jpg');
            background-size: cover;
            background-position: center;
            z-index: 10;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 40px;
            cursor: pointer;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }

        .start-text {
            color: #39ff14;
            font-size: 28px;
            font-weight: bold;
            background-color: rgba(11, 1, 24, 0.8);
            padding: 10px 20px;
            border: 2px solid #ff00ff;
            text-shadow: 2px 2px #000;
            animation: blink 1.5s infinite;
            pointer-events: none;
        }

        canvas {
            background: linear-gradient(180deg, #120129 0%, #0b0118 100%);
            display: block;
        }

        #instructions {
            margin-top: 15px;
            font-size: 18px;
            color: #00ffff;
        }
    </style>
</head>
<body>

    <h1>MAMA RIOT: LEVEL 1</h1>
    
    <div id="gameContainer">
